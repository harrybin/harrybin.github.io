<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">From vague requirements to testable outcomes with BMAD and GitHub Copilot</title>
  <desc id="desc">Hero illustration showing a left-to-right workflow from idea to PRD, context, architecture, tests, and traceability.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="50%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="800" y="110" text-anchor="middle" fill="#f8fafc" font-size="56" font-family="Segoe UI, Arial, sans-serif" font-weight="700">BMAD + GitHub Copilot</text>
  <text x="800" y="165" text-anchor="middle" fill="#dbeafe" font-size="34" font-family="Segoe UI, Arial, sans-serif">From Vague Ideas to Testable Outcomes</text>

  <g>
    <rect x="90" y="290" width="210" height="130" rx="18" fill="#1d4ed8"/>
    <text x="195" y="360" text-anchor="middle" fill="#eff6ff" font-size="28" font-family="Segoe UI, Arial, sans-serif">Idea</text>

    <rect x="350" y="290" width="210" height="130" rx="18" fill="#2563eb"/>
    <text x="455" y="360" text-anchor="middle" fill="#eff6ff" font-size="28" font-family="Segoe UI, Arial, sans-serif">PRD</text>

    <rect x="610" y="290" width="210" height="130" rx="18" fill="#0284c7"/>
    <text x="715" y="360" text-anchor="middle" fill="#ecfeff" font-size="28" font-family="Segoe UI, Arial, sans-serif">Context</text>

    <rect x="870" y="290" width="210" height="130" rx="18" fill="#0ea5e9"/>
    <text x="975" y="360" text-anchor="middle" fill="#082f49" font-size="28" font-family="Segoe UI, Arial, sans-serif">Architecture</text>

    <rect x="1130" y="290" width="210" height="130" rx="18" fill="#14b8a6"/>
    <text x="1235" y="360" text-anchor="middle" fill="#052e2b" font-size="28" font-family="Segoe UI, Arial, sans-serif">Tests</text>

    <rect x="1390" y="290" width="170" height="130" rx="18" fill="#10b981"/>
    <text x="1475" y="350" text-anchor="middle" fill="#052e16" font-size="24" font-family="Segoe UI, Arial, sans-serif">Trace</text>
    <text x="1475" y="382" text-anchor="middle" fill="#052e16" font-size="24" font-family="Segoe UI, Arial, sans-serif">NFR</text>
  </g>

  <g stroke="#e2e8f0" stroke-width="8" fill="none">
    <line x1="300" y1="355" x2="350" y2="355"/>
    <line x1="560" y1="355" x2="610" y2="355"/>
    <line x1="820" y1="355" x2="870" y2="355"/>
    <line x1="1080" y1="355" x2="1130" y2="355"/>
    <line x1="1340" y1="355" x2="1390" y2="355"/>
  </g>

  <g fill="#e2e8f0">
    <polygon points="350,355 330,343 330,367"/>
    <polygon points="610,355 590,343 590,367"/>
    <polygon points="870,355 850,343 850,367"/>
    <polygon points="1130,355 1110,343 1110,367"/>
    <polygon points="1390,355 1370,343 1370,367"/>
  </g>

  <text x="800" y="620" text-anchor="middle" fill="#d1fae5" font-size="34" font-family="Segoe UI, Arial, sans-serif">Checkpoints + artifacts keep requirements, architecture, and testing aligned.</text>
  <text x="800" y="680" text-anchor="middle" fill="#a7f3d0" font-size="30" font-family="Segoe UI, Arial, sans-serif">Talk recap visual</text>
</svg>
